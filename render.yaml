services:
  # 1. Backend Service (FastAPI)
  - type: web
    name: claim360-api
    plan: free # Explicitly set free plan
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: BASE_URL # The URL of the backend (once deployed)
        sync: false
      - key: FRONTEND_URL # The URL of the frontend (once deployed)
        sync: false

  # 2. Frontend Service (Static Site)
  - type: web
    name: claim360-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL # Points to the backend URL
        fromService:
          name: claim360-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
