services:
  # 1. Backend Service
  - type: web
    name: claim360-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # You must set this in the dashboard
      - key: SECRET_KEY
        generateValue: true

  # 2. Frontend Service
  - type: web
    name: claim360-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: claim360-api
          type: web
          property: host
    routes:
      # This fixes the "Not Found" error on page refresh or redirect
      - type: rewrite
        source: /api/*
        destination: https://claim360-api.onrender.com/api/* # Fallback proxy if needed
      - type: rewrite
        source: /*
        destination: /index.html
